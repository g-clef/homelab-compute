# kubernetes/llm/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: llm
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: accelerator
                operator: In
                values:
                - nvidia
      initContainers:
      - name: download-model
        image: python:3.11-slim
        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "500m"
            memory: 512Mi
        command:
        - /bin/sh
        - -c
        - |
          set -e
          DEST="/models/Qwen3.5-9B-AWQ"
          if [ -f "$DEST/config.json" ]; then
            echo "Model already downloaded, skipping."
            exit 0
          fi
          echo "Installing huggingface_hub..."
          pip install -q "huggingface_hub==1.8.0"
          echo "Downloading model..."
          python -c "from huggingface_hub import snapshot_download; snapshot_download('QuantTrio/Qwen3.5-9B-AWQ', local_dir='$DEST')"
          echo "Download complete."
        volumeMounts:
        - name: models
          mountPath: /models
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.18.0
        args:
        - --model
        - /models/Qwen3.5-9B-AWQ
        - --quantization
        - awq
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.90"
        - --served-model-name
        - qwen3.5
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 40
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 240
          periodSeconds: 15
          failureThreshold: 40
          timeoutSeconds: 5
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models
