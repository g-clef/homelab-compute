# kubernetes/llm/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: llm
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: accelerator
                operator: In
                values:
                - nvidia
      initContainers:
      - name: download-model
        image: python:3.11-slim
        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "500m"
            memory: 512Mi
        command:
        - /bin/sh
        - -c
        - |
          set -e
          DEST="/models/Qwen3.5-9B-AWQ"
          SENTINEL="$DEST/.download_complete"
          if [ -f "$SENTINEL" ]; then
            echo "Model already downloaded, skipping."
            exit 0
          fi
          mkdir -p "$DEST"
          echo "Downloading model..."
          python3 /dev/stdin <<'PYEOF'
          import urllib.request, json, os, sys

          dest = '/models/Qwen3.5-9B-AWQ'
          repo = 'QuantTrio/Qwen3.5-9B-AWQ'

          print('Fetching file list...', flush=True)
          req = urllib.request.Request(
              f'https://huggingface.co/api/models/{repo}',
              headers={'User-Agent': 'python-urllib/3.11'}
          )
          with urllib.request.urlopen(req) as r:
              siblings = json.load(r).get('siblings', [])

          for s in siblings:
              fname = s['rfilename']
              fpath = os.path.join(dest, fname)
              os.makedirs(os.path.dirname(fpath) or dest, exist_ok=True)
              print(f'Downloading {fname}...', flush=True)
              req = urllib.request.Request(
                  f'https://huggingface.co/{repo}/resolve/main/{fname}',
                  headers={'User-Agent': 'python-urllib/3.11'}
              )
              with urllib.request.urlopen(req) as r, open(fpath, 'wb') as f:
                  while True:
                      chunk = r.read(1024 * 1024)
                      if not chunk:
                          break
                      f.write(chunk)
          print('All files downloaded.', flush=True)
          PYEOF
          touch "$SENTINEL"
          echo "Download complete."
        volumeMounts:
        - name: models
          mountPath: /models
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.18.0
        args:
        - --model
        - /models/Qwen3.5-9B-AWQ
        - --quantization
        - awq
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.90"
        - --served-model-name
        - qwen3.5
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 40
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 240
          periodSeconds: 15
          failureThreshold: 40
          timeoutSeconds: 5
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models
