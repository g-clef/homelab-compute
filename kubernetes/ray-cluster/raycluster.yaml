apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: homelab-ray
  namespace: ray
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  rayVersion: '2.54.0'
  enableInTreeAutoscaling: true
  autoscalerOptions:
    upscalingMode: Default
    idleTimeoutSeconds: 60
    resources:
      requests:
        cpu: "500m"
        memory: 512Mi
      limits:
        cpu: "500m"
        memory: 512Mi
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      metadata:
        labels:
          app: ray-head
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.54.0
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
  workerGroupSpecs:
  - replicas: 0
    minReplicas: 0
    maxReplicas: 4
    groupName: small-group
    rayStartParams: {}
    template:
      metadata:
        labels:
          app: ray-worker
      spec:
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: nvidia.com/gpu
                  operator: DoesNotExist
        containers:
        - name: ray-worker
          image: rayproject/ray:2.40.0
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
